[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

# Friendly /api/* paths → functions
[[redirects]]
  from = "/api/submit"
  to = "/.netlify/functions/submit"
  status = 200
[[redirects]]
  from = "/api/enrich"
  to = "/.netlify/functions/enrich"
  status = 200
[[redirects]]
  from = "/api/event"
  to = "/.netlify/functions/event"
  status = 200
[[redirects]]
  from = "/api/leaderboard"
  to = "/.netlify/functions/leaderboard"
  status = 200
[[redirects]]
  from = "/api/ping"
  to = "/.netlify/functions/ping"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'"
